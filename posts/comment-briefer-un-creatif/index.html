<!doctype html>
<html lang="fr">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>Carousel</title>

	<style>
		:root{
			--ink:#0f0f0f;
			--cream:#EDE7DA;
			--cream2:#F6F2E8;
			--terra:#C94F2D;
		}

		*{ box-sizing:border-box; }
		html,body{ height:100%; }
		body{
			margin:0;
			background: var(--ink);
			color: var(--cream);
			font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
		}

		/* Layout global écran */
		.page{
			padding: 16px;
		}

		/* ÉCRAN: carrousel horizontal */
		.carousel-ui{
			position: relative;
			max-width: 1080px;
			margin: 0 auto;
		}

		.carousel-track{
			display: flex;
			gap: 0;
			overflow-x: auto;
			scroll-snap-type: x mandatory;
			-webkit-overflow-scrolling: touch;
			scroll-behavior: smooth;

			/* option: cache scrollbar */
			scrollbar-width: none;
		}
		.carousel-track::-webkit-scrollbar{ display:none; }

		.slide{
			flex: 0 0 100%;
			scroll-snap-align: center;
			scroll-snap-stop: always;

			/* pour que la slide prenne un “format” lisible à l’écran */
			min-height: calc(100dvh - 32px);
			padding: 24px;
			display: grid;
			align-content: start;
			background: var(--ink);
			border: 1px solid rgba(255,255,255,.08);
			border-radius: 16px;
		}

		/* Flèches: desktop only */
		.nav{
			position: absolute;
			top: 50%;
			transform: translateY(-50%);
			width: 44px;
			height: 44px;
			border-radius: 999px;
			border: none;
			background: rgba(201,79,45,.95);
			color: #0f0f0f;
			font-size: 28px;
			font-weight: 900;
			cursor: pointer;
			display: none;
			user-select: none;
		}

		.nav.prev{ left: -16px; }
		.nav.next{ right: -16px; }

		@media (min-width: 900px){
			.page{ padding: 24px; }
			.nav{ display: grid; place-items: center; }
			.slide{ min-height: min(720px, calc(100vh - 48px)); }
		}

		/* ---- Ton design system de slide (à adapter) ---- */
		/* Tu peux garder tes classes existantes: .content-safe, .footer-safe, etc. */
		.h1{
			font-weight: 900;
			letter-spacing: .02em;
			text-transform: uppercase;
			line-height: 1.02;
			margin: 0 0 12px 0;
			font-size: clamp(28px, 5vw, 56px);
		}
		.p{
			margin:0;
			max-width: 65ch;
			color: rgba(237,231,218,.9);
			font-size: 16px;
			line-height: 1.45;
		}
		.badge{
			display:inline-block;
			padding: 6px 10px;
			border-radius: 999px;
			background: rgba(201,79,45,.18);
			border: 1px solid rgba(201,79,45,.35);
			color: var(--cream);
			font-weight: 700;
			text-transform: uppercase;
			letter-spacing: .08em;
			font-size: 12px;
			margin-bottom: 10px;
		}

		/* PRINT: on imprime toutes les slides (pas le swipe) */
		@media print{
			@page{
				size: A4 portrait;
				margin: 0;
			}

			body{
				background: #fff !important;
				color: #000 !important;
			}

			.page{
				padding: 0 !important;
			}

			.carousel-ui{
				max-width: none !important;
				margin: 0 !important;
			}

			.carousel-track{
				overflow: visible !important;
				display: block !important;
			}

			.slide{
				/* chaque slide = page */
				page-break-after: always;
				break-after: page;

				/* en print, on force un format page */
				width: 210mm;
				height: 297mm;
				min-height: 0 !important;
				border: none !important;
				border-radius: 0 !important;
				padding: 18mm;

				background: #fff !important;
				color: #000 !important;
			}

			.nav{ display:none !important; }
		}
	</style>
</head>

<body>
	<main class="page">
		<div class="carousel-ui">
			<button class="nav prev" type="button" aria-label="Précédent">‹</button>

			<div class="carousel-track" id="track" tabindex="0" aria-label="Carrousel">
				<section class="slide">
					<div class="badge">Principe 1</div>
					<h2 class="h1">Titre de ta slide 1</h2>
					<p class="p">Ton contenu ici. Tu peux remettre ton layout exact (content-safe, footer-safe, etc.).</p>
				</section>

				<section class="slide">
					<div class="badge">Principe 2</div>
					<h2 class="h1">Titre de ta slide 2</h2>
					<p class="p">Texte, visuels, etc.</p>
				</section>

				<section class="slide">
					<div class="badge">Principe 3</div>
					<h2 class="h1">Titre de ta slide 3</h2>
					<p class="p">Texte, visuels, etc.</p>
				</section>
			</div>

			<button class="nav next" type="button" aria-label="Suivant">›</button>
		</div>
	</main>

	<script>
		const track = document.getElementById("track");
		const prev = document.querySelector(".nav.prev");
		const next = document.querySelector(".nav.next");

		function slideWidth(){
			const first = track.querySelector(".slide");
			return first ? first.getBoundingClientRect().width : 0;
		}

		prev?.addEventListener("click", () => {
			track.scrollBy({ left: -slideWidth(), behavior: "smooth" });
		});

		next?.addEventListener("click", () => {
			track.scrollBy({ left: slideWidth(), behavior: "smooth" });
		});

		// Bonus: clavier (desktop)
		track?.addEventListener("keydown", (e) => {
			if(e.key === "ArrowLeft"){
				e.preventDefault();
				track.scrollBy({ left: -slideWidth(), behavior: "smooth" });
			}
			if(e.key === "ArrowRight"){
				e.preventDefault();
				track.scrollBy({ left: slideWidth(), behavior: "smooth" });
			}
		});
	</script>
</body>
</html>
